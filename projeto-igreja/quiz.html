<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico: Da Eternidade à Terra Prometida</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --light: #f8f9fa;
            --dark: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 20px; }

        .quiz-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 10px; }

        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--dark); }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 1rem;
        }

        .option-btn:hover { border-color: var(--primary); background: #f0f4ff; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        #next-btn {
            margin-top: 25px;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            cursor: pointer;
        }

        .result-screen { text-align: center; display: none; }
        .score { font-size: 2.5rem; color: var(--secondary); font-weight: bold; margin: 20px 0; }
        .btn-home { 
            display: inline-block; padding: 12px 25px; background: var(--primary); 
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <header>
            <h1>Desafio da Fé</h1>
            <p>Capítulos 1 ao 9: A Conquista</p>
        </header>

        <div id="quiz">
            <div class="question" id="question">Carregando...</div>
            <div class="options" id="options"></div>
            <button id="next-btn">Próxima Pergunta</button>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Excelente Caminhada!</h2>
            <p>Você completou a primeira parte da cronologia:</p>
            <div class="score" id="final-score">0 / 0</div>
            <a href="estudos.html" class="btn-home">Voltar para Estudos</a>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Segundo João 1:1, quem estava com Deus no princípio?",
                options: ["O Verbo", "Os anjos", "Adão", "Abraão"],
                answer: 0
            },
            {
                q: "Qual sinal Deus deu a Noé após o Dilúvio como promessa de que não destruiria a terra novamente?",
                options: ["Um pombo", "Um arco-íris", "Uma oliveira", "Um altar"],
                answer: 1
            },
            {
                q: "A quem Deus prometeu que sua descendência seria como as estrelas do céu?",
                options: ["José", "Isaque", "Jacó", "Abraão"],
                answer: 3
            },
            {
                q: "José foi vendido como escravo para qual país?",
                options: ["Babilônia", "Assíria", "Egito", "Canaã"],
                answer: 2
            },
            {
                q: "No Monte Sinai, quantos foram os mandamentos principais entregues a Moisés?",
                options: ["5 mandamentos", "7 mandamentos", "10 mandamentos", "12 mandamentos"],
                answer: 2
            },
            {
                q: "Qual foi o sucessor de Moisés que liderou o povo na conquista das muralhas de Jericó?",
                options: ["Calebe", "Samuel", "Saul", "Josué"],
                answer: 3
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const nextBtn = document.getElementById('next-btn');
        const quizDiv = document.getElementById('quiz');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreEl = document.getElementById('final-score');

        function loadQuestion() {
            const qData = questions[currentQuestion];
            questionEl.innerText = qData.q;
            optionsEl.innerHTML = "";
            nextBtn.style.display = "none";

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => selectOption(index, btn);
                optionsEl.appendChild(btn);
            });
        }

        function selectOption(index, btn) {
            const correct = questions[currentQuestion].answer;
            const allBtns = document.querySelectorAll('.option-btn');
            
            allBtns.forEach(b => b.disabled = true);

            if (index === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns[correct].classList.add('correct');
            }
            nextBtn.style.display = "block";
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizDiv.style.display = "none";
            resultScreen.style.display = "block";
            finalScoreEl.innerText = score + " / " + questions.length;
        }

        loadQuestion();
    </script>
</body>
</html>

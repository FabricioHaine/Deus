<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico Dinâmico - Elim Church</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --light: #f8f9fa;
            --dark: #2d3436;
            --accent: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 20px; }

        .quiz-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .badge-info { font-size: 0.8rem; color: #666; font-style: italic; }

        .btn-sair-topo {
            position: absolute;
            top: 20px;
            right: 20px;
            text-decoration: none;
            color: #999;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .btn-sair-topo:hover { color: var(--secondary); }

        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--dark); }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 1rem;
        }

        .option-btn:hover { border-color: var(--primary); background: #f0f4ff; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        #next-btn {
            margin-top: 25px;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            cursor: pointer;
        }

        .result-screen { text-align: center; display: none; }
        .score { font-size: 3rem; color: var(--secondary); font-weight: bold; margin: 20px 0; }
        
        .btn-restart { 
            display: inline-block; padding: 12px 25px; background: var(--primary); 
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
            cursor: pointer; margin: 10px 5px; border: none;
        }

        .btn-home-final {
            display: inline-block; padding: 12px 25px; background: transparent; 
            color: var(--primary); text-decoration: none; border: 2px solid var(--primary);
            border-radius: 5px; font-weight: bold; margin: 10px 5px; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <a href="../index.html" class="btn-sair-topo">SAIR ✕</a>

        <header>
            <h1>Desafio Elim</h1>
            <p class="badge-info">10 perguntas aleatórias do nosso banco de dados</p>
        </header>

        <div id="quiz">
            <div class="question" id="question">Preparando perguntas...</div>
            <div class="options" id="options"></div>
            <button id="next-btn">Próxima Pergunta</button>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Fim do Desafio!</h2>
            <div class="score" id="final-score">0 / 10</div>
            <button onclick="location.reload()" class="btn-restart">Tentar Novamente</button>
            <a href="../index.html" class="btn-home-final">Início</a>
        </div>
    </div>

    <script>
        const allQuestions = [
            // ORIGENS E PATRIARCAS
            { q: "Quem existia antes de todas as coisas, segundo o estudo do Verbo?", options: ["Adão", "Moisés", "Jesus (O Verbo)", "Noé"], answer: 2 },
            { q: "Qual foi o castigo de Adão após a queda?", options: ["Trabalho penoso na terra", "Viver no mar", "Não poder mais falar", "Ficar cego"], answer: 0 },
            { q: "Qual o nome do filho de Noé de onde veio a linhagem de Abraão?", options: ["Cã", "Jafé", "Sem", "Ló"], answer: 2 },
            { q: "Abraão saiu de qual cidade?", options: ["Ur dos Caldeus", "Harã", "Babilônia", "Nazaré"], answer: 0 },
            { q: "Quem foi transformado em estátua de sal ao olhar para trás?", options: ["Esposa de Abraão", "Esposa de Ló", "Sara", "Rebeca"], answer: 1 },
            { q: "Jacó teve quantos filhos, que originaram as tribos de Israel?", options: ["3", "7", "10", "12"], answer: 3 },
            { q: "Qual filho de Jacó foi vendido como escravo por inveja?", options: ["Rúben", "Benjamim", "José", "Levi"], answer: 2 },

            // ÊXODO E LEI
            { q: "Como Deus apareceu a Moisés no deserto pela primeira vez?", options: ["Em um sonho", "Numa sarça ardente", "Através de um anjo", "Numa nuvem"], answer: 1 },
            { q: "O que o povo comeu no deserto enviado por Deus?", options: ["Pão e Mel", "Maná e Codornizes", "Peixe", "Frutos da terra"], answer: 1 },
            { q: "Qual mandamento diz: 'Não tomarás o nome do Senhor em vão'?", options: ["1º", "2º", "3º", "4º"], answer: 2 },
            { q: "Onde ficava guardada a Arca da Aliança?", options: ["No pátio", "No Lugar Santo", "No Lugar Santíssimo", "Na entrada"], answer: 2 },

            // CONQUISTA E JUÍZES
            { q: "Quem escondeu os espiões em Jericó?", options: ["Raabe", "Rute", "Débora", "Dalila"], answer: 0 },
            { q: "Quantos juízes lideraram Israel no livro de Juízes?", options: ["10", "12", "15", "7"], answer: 1 },
            { q: "Qual juiz derrotou os midianitas com apenas 300 homens?", options: ["Sansão", "Gideão", "Baraque", "Jefté"], answer: 1 },
            { q: "Qual era o segredo da força de Sansão?", options: ["Seus olhos", "Seu voto nazireu (cabelo)", "Sua espada", "Sua dieta"], answer: 1 },

            // REIS E PROFETAS
            { q: "Qual rei era um pastor de ovelhas antes da coroa?", options: ["Saul", "Salomão", "Davi", "Josias"], answer: 2 },
            { q: "Quem unificou as tribos e fez de Jerusalém a capital?", options: ["Moisés", "Davi", "Salomão", "Saul"], answer: 1 },
            { q: "Qual rei pediu sabedoria a Deus em vez de riquezas?", options: ["Davi", "Ezequias", "Salomão", "Josias"], answer: 2 },
            { q: "O reino se dividiu em dois: Israel (Norte) e qual o nome do Sul?", options: ["Edom", "Judá", "Moabe", "Samaria"], answer: 1 },
            { q: "Qual profeta foi levado ao céu num redemoinho e carruagem de fogo?", options: ["Elias", "Eliseu", "Isaías", "Jeremias"], answer: 0 },
            { q: "Qual profeta avisou que o povo seria levado para a Babilônia?", options: ["Amós", "Jeremias", "Oseias", "Malaquias"], answer: 1 },

            // EXÍLIO E RETORNO
            { q: "Quem interpretou o sonho da estátua de Nabucodonosor?", options: ["Ezequiel", "Daniel", "Neemias", "Esdras"], answer: 1 },
            { q: "Qual rainha judia salvou seu povo do extermínio na Pérsia?", options: ["Ester", "Rute", "Abigail", "Miriã"], answer: 0 },
            { q: "O que Neemias foi fazer em Jerusalém?", options: ["Construir o Templo", "Reconstruir os muros", "Ser o novo Sumo Sacerdote", "Escrever um livro"], answer: 1 },

            // VIDA DE JESUS
            { q: "Quem era a mãe de Jesus?", options: ["Isabel", "Maria", "Marta", "Madalena"], answer: 1 },
            { q: "Onde Jesus foi batizado?", options: ["Mar Morto", "Rio Nilo", "Rio Jordão", "Mar da Galileia"], answer: 2 },
            { q: "Quem era o discípulo amado que escreveu o Apocalipse?", options: ["Pedro", "Paulo", "João", "Tiago"], answer: 2 },
            { q: "Quantas pessoas Jesus alimentou com 5 pães e 2 peixes?", options: ["1000", "3000", "5000", "100"], answer: 2 },
            { q: "Qual discípulo negou Jesus três vezes?", options: ["Judas", "Pedro", "Tomé", "Mateus"], answer: 1 },
            { q: "Quem pediu o corpo de Jesus para sepultar?", options: ["Nicodemos", "José de Arimateia", "Pedro", "Lázaro"], answer: 1 },

            // ATOS E EPÍSTOLAS
            { q: "Qual o nome da cidade onde os discípulos foram chamados de cristãos pela primeira vez?", options: ["Jerusalém", "Antioquia", "Roma", "Éfeso"], answer: 1 },
            { q: "Qual era o nome de Paulo antes de sua conversão?", options: ["Saulo", "Simão", "Levi", "Estevão"], answer: 0 },
            { q: "Quem foi o primeiro mártir da igreja cristã?", options: ["Pedro", "Estevão", "Tiago", "Paulo"], answer: 1 },
            { q: "Para qual igreja Paulo escreveu sobre o 'Hino ao Amor'?", options: ["Romanos", "Gálatas", "Coríntios", "Efésios"], answer: 2 },
            { q: "Qual livro fala sobre a armadura de Deus?", options: ["Filipenses", "Efésios", "Colossenses", "Hebreus"], answer: 1 },

            // APOCALIPSE
            { q: "Quantas igrejas recebem cartas no início do Apocalipse?", options: ["3", "7", "12", "10"], answer: 1 },
            { q: "O que significa a palavra 'Apocalipse'?", options: ["Fim do mundo", "Revelação", "Destruição", "Segredo"], answer: 1 },
            { q: "Na Nova Jerusalém, o que não existirá mais?", options: ["Sol", "Lágrimas e Morte", "Mar", "Todas as anteriores"], answer: 3 }
        ];

        let selectedQuestions = [];
        let currentQuestion = 0;
        let score = 0;
        const totalQuestionsPerRound = 10; // Limite de 10 perguntas

        function initQuiz() {
            // Sorteia 10 perguntas aleatórias do banco de dados
            let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
            selectedQuestions = shuffled.slice(0, totalQuestionsPerRound);
            loadQuestion();
        }

        function loadQuestion() {
            const qData = selectedQuestions[currentQuestion];
            document.getElementById('question').innerText = qData.q;
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = "";
            document.getElementById('next-btn').style.display = "none";

            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');
                btn.onclick = () => selectOption(index, btn);
                optionsEl.appendChild(btn);
            });
        }

        function selectOption(index, btn) {
            const correct = selectedQuestions[currentQuestion].answer;
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (index === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns[correct].classList.add('correct');
            }
            document.getElementById('next-btn').style.display = "block";
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestion++;
            if (currentQuestion < selectedQuestions.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz').style.display = "none";
                document.getElementById('result-screen').style.display = "block";
                document.getElementById('final-score').innerText = score + " / " + totalQuestionsPerRound;
            }
        };

        initQuiz();
    </script>
</body>
</html>

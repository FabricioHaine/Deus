<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Elim Church</title>
    <link rel="icon" type="image/png" href="img/elim01.png">
    
    <script>
        // SEGURANÇA: Se não houver login, manda para o cadastro.
        // Se for o Admin Master, redireciona para a página dele.
        const userType = localStorage.getItem('elim_tipo_usuario');
        const userId = localStorage.getItem('elim_aluno_id');

        if (!userId) {
            window.location.href = "login.html";
        } else if (userType === 'admin') {
            window.location.href = "admin.html";
        }
    </script>

    <style>
        :root {
            --azul-escuro: #0a1128;
            --azul-meio: #1a2a6c;
            --turquesa: #00e5ff;
            --branco: #ffffff;
            --laranja-fogo: #ff9800;
            --ouro: #ffd700;
            --cinza-bloqueado: rgba(255, 255, 255, 0.05);
        }

        body {
            background: linear-gradient(180deg, var(--azul-escuro) 0%, var(--azul-meio) 100%);
            min-height: 100vh;
            color: var(--branco);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .perfil-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .avatar-circulo {
            width: 110px; height: 110px;
            background: var(--azul-escuro);
            border: 4px solid var(--turquesa);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .avatar-circulo:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--turquesa); }

        .progresso-container { margin: 20px 0; text-align: left; }
        .progresso-label { font-size: 0.8rem; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .barra-fundo {
            width: 100%; height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .barra-preenchida {
            width: 0%; height: 100%;
            background: var(--turquesa);
            transition: width 1s ease-in-out;
            box-shadow: 0 0 10px var(--turquesa);
        }

        .conquistas-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .medalha {
            background: var(--cinza-bloqueado);
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            opacity: 0.3;
            transition: 0.5s;
            filter: grayscale(1);
            border: 1px solid transparent;
        }
        .medalha.desbloqueada {
            opacity: 1;
            filter: grayscale(0);
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--turquesa);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        .medalha-icone { font-size: 2rem; display: block; margin-bottom: 5px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: #1a2a6c; padding: 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; border: 1px solid var(--turquesa); }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .avatar-opt { font-size: 2.2rem; cursor: pointer; padding: 10px; border-radius: 10px; transition: 0.2s; }
        .avatar-opt:hover { background: rgba(255,255,255,0.1); transform: scale(1.2); }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-top: 20px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-card strong { font-size: 1.1rem; color: var(--turquesa); }
        .fogo { color: var(--laranja-fogo) !important; }

        .botoes-acao { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
        .btn-voltar, .btn-sair {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
        }
        .btn-voltar { background: var(--turquesa); color: var(--azul-escuro); }
        .btn-sair { background: rgba(255, 255, 255, 0.1); color: var(--branco); border: 1px solid rgba(255,255,255,0.2); }
        .btn-sair:hover { background: #ff4b2b; border-color: #ff4b2b; }
    </style>
</head>
<body>

    <div class="perfil-container">
        <div class="avatar-circulo" id="avatar-display" onclick="abrirModal()">👤</div>
        <small style="color: var(--turquesa); cursor: pointer;" onclick="abrirModal()">Trocar Avatar</small>
        
        <h2 id="perfil-nome" style="margin-top: 10px;">Carregando...</h2>
        <p style="opacity: 0.5; font-size: 0.75rem;" id="perfil-id">Matrícula: --</p>

        <div class="progresso-container">
            <div class="progresso-label">
                <span>Caminho do Aprendizado</span>
                <span id="texto-progresso">0/24</span>
            </div>
            <div class="barra-fundo">
                <div class="barra-preenchida" id="barra-progresso"></div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span style="font-size: 0.8rem; opacity: 0.7;">Frequência</span><br>
                <strong class="fogo" id="perfil-streak">0 Dias</strong>
            </div>
            <div class="stat-card">
                <span style="font-size: 0.8rem; opacity: 0.7;">Último Acesso</span><br>
                <strong id="perfil-acesso">--/--</strong>
            </div>
        </div>

        <div class="conquistas-section">
            <h3 style="font-size: 1rem; margin-bottom: 15px; margin-top: 25px;">🏅 Suas Conquistas</h3>
            <div class="conquistas-grid">
                <div class="medalha" id="med-passos"><span class="medalha-icone">👣</span><strong>Primeiros Passos</strong></div>
                <div class="medalha" id="med-fiel"><span class="medalha-icone">🌱</span><strong>Fiel no Pouco</strong></div>
                <div class="medalha" id="med-mestre"><span class="medalha-icone">🎓</span><strong>Mestre Quiz</strong></div>
                <div class="medalha" id="med-coluna"><span class="medalha-icone">🏛️</span><strong>Coluna</strong></div>
            </div>
        </div>

        <div class="botoes-acao">
            <a href="index.html" class="btn-voltar">Página Inicial</a>
            <button onclick="fazerLogout()" class="btn-sair">Sair da Conta</button>
        </div>
    </div>

    <div id="modalAvatar" class="modal">
        <div class="modal-content">
            <h3 style="color: white">Escolha seu Personagem</h3>
            <div class="avatar-grid">
                <div class="avatar-opt" onclick="mudarAvatar('🦁')">🦁</div>
                <div class="avatar-opt" onclick="mudarAvatar('🐑')">🐑</div>
                <div class="avatar-opt" onclick="mudarAvatar('🕊️')">🕊️</div>
                <div class="avatar-opt" onclick="mudarAvatar('🔥')">🔥</div>
                <div class="avatar-opt" onclick="mudarAvatar('🛡️')">🛡️</div>
                <div class="avatar-opt" onclick="mudarAvatar('📖')">📖</div>
                <div class="avatar-opt" onclick="mudarAvatar('👑')">👑</div>
                <div class="avatar-opt" onclick="mudarAvatar('⚓')">⚓</div>
            </div>
            <button onclick="fecharModal()" style="margin-top: 20px; background: none; border: 1px solid white; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Cancelar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDua2xE37-guB4SeE5yDgb3A_P3DTCWwQ0",
            authDomain: "elim-church-d2117.firebaseapp.com",
            databaseURL: "https://elim-church-d2117-default-rtdb.firebaseio.com",
            projectId: "elim-church-d2117",
            storageBucket: "elim-church-d2117.firebasestorage.app",
            messagingSenderId: "687076464234",
            appId: "1:687076464234:web:972b0d7b6b9a4270b71c13"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const idUsuario = localStorage.getItem('elim_aluno_id');

        // Carregar dados em tempo real do Firebase
        if (idUsuario) {
            database.ref('alunos/' + idUsuario).on('value', (snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    document.getElementById('perfil-nome').innerText = dados.nome;
                    document.getElementById('perfil-id').innerText = "Matrícula: " + idUsuario.replace("id_", "");
                    document.getElementById('avatar-display').innerText = dados.avatar || "👤";
                    
                    const streakAtual = dados.streak ? dados.streak.count : 0;
                    document.getElementById('perfil-streak').innerText = streakAtual + " Dias";
                    document.getElementById('perfil-acesso').innerText = dados.ultimoAcesso ? dados.ultimoAcesso.split(' às ')[0] : "--/--";

                    const licoes = dados.licoesConcluidas ? dados.licoesConcluidas.length - 1 : 0; // -1 para ignorar o [0] inicial
                    const porcentagem = Math.min((licoes / 24) * 100, 100);
                    document.getElementById('texto-progresso').innerText = licoes + "/24";
                    document.getElementById('barra-progresso').style.width = porcentagem + "%";

                    // Ativação das Medalhas
                    if (dados.medalhas?.primeiros_passos) document.getElementById('med-passos').classList.add('desbloqueada');
                    if (streakAtual >= 7) document.getElementById('med-fiel').classList.add('desbloqueada');
                    if (streakAtual >= 30) document.getElementById('med-coluna').classList.add('desbloqueada');
                    if (dados.medalhas?.mestre_quiz) document.getElementById('med-mestre').classList.add('desbloqueada');
                }
            });
        }

        function abrirModal() { document.getElementById('modalAvatar').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalAvatar').style.display = 'none'; }
        
        function mudarAvatar(emoji) {
            database.ref('alunos/' + idUsuario).update({ avatar: emoji })
            .then(() => fecharModal());
        }

        function fazerLogout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
